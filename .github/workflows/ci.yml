name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        id: test
        run: |
          set +e
          python -m pytest tests/unit -v --junitxml=unit-results.xml 2>&1 | tee unit-output.txt
          PASSED=$(grep -oE '[0-9]+ passed' unit-output.txt | tail -1 | grep -oE '[0-9]+' | head -1)
          FAILED=$(grep -oE '[0-9]+ failed' unit-output.txt | tail -1 | grep -oE '[0-9]+' | head -1)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          TOTAL=$((PASSED + FAILED))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: unit-results.xml

  integration-tests:
    name: Integration tests
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.test.outputs.passed }}
      total: ${{ steps.test.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-integration.txt

      - name: Run integration tests
        id: test
        env:
          RUN_INTEGRATION: "1"
          HA_URL: http://127.0.0.1:8123
          OLLAMA_MOCK_URL: http://127.0.0.1:11434
          HA_OLLAMA_URL: http://ollama-mock:11434
        run: |
          set +e
          bash scripts/run_integration_tests.sh --junitxml=integration-results.xml 2>&1 | tee integration-output.txt
          PASSED=$(grep -oE '[0-9]+ passed' integration-output.txt | tail -1 | grep -oE '[0-9]+' | head -1)
          FAILED=$(grep -oE '[0-9]+ failed' integration-output.txt | tail -1 | grep -oE '[0-9]+' | head -1)
          ERROR=$(grep -oE '[0-9]+ error' integration-output.txt | tail -1 | grep -oE '[0-9]+' | head -1)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          ERROR=${ERROR:-0}
          TOTAL=$((PASSED + FAILED + ERROR))
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          [ "$FAILED" -eq 0 ] && [ "$ERROR" -eq 0 ] && [ "$PASSED" -gt 0 ]

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: integration-results.xml

  update-readme:
    name: Update README CI status
    needs: [unit-tests, integration-tests]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update README.md CI section
        env:
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/update_readme_ci_status.py \
            "${{ needs.unit-tests.outputs.passed }}" \
            "${{ needs.unit-tests.outputs.total }}" \
            "${{ needs.integration-tests.outputs.passed }}" \
            "${{ needs.integration-tests.outputs.total }}" \
            "${{ github.sha }}" \
            "${WORKFLOW_URL}" \
            README.md

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes to commit"
            exit 0
          fi
          git commit -m "docs: update CI status in README [skip ci]"
          git push
